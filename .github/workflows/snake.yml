name: generate animation

on:
  schedule:
    - cron: "0 0 * * *" # runs daily at midnight UTC
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Adjust the gaps around the level "progress bar": raise it to
      # 22px below the grid (grid bottom y=110, bar y=132), and pad the
      # canvas 18px below the bar so bar-to-repo-cards totals 34px once
      # GitHub's fixed 16px paragraph margin is added. sudo because
      # the docker action writes dist/ as root. Loud grep so a future
      # snk layout change fails the job instead of silently skipping.
      - name: adjust progress bar gaps
        run: |
          for f in dist/github-contribution-grid-snake.svg dist/github-contribution-grid-snake-dark.svg; do
            sudo sed -i 's/y="144"/y="132"/g; s/viewBox="-16 -32 880 192" width="880" height="192"/viewBox="-16 -32 880 194" width="880" height="194"/' "$f"
            grep -q 'y="132"' "$f"
            grep -q 'height="194"' "$f"
          done

      - name: push snake artifact to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-featured-repos:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: install imagemagick for poster extraction
        run: sudo apt-get update -q && sudo apt-get install -y -q --no-install-recommends imagemagick

      - name: regenerate featured repositories section
        run: node scripts/update-featured-repos.mjs ${{ github.repository_owner }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: commit README and cards if changed
        run: |
          git add README.md assets
          if ! git diff --staged --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "Update featured repositories"
            git push
          else
            echo "README and cards already up to date"
          fi
